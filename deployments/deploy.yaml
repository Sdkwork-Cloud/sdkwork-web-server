version: 2
defaultProfile: cloud.production

profiles:
  cloud.production:
    deployment:
      deploymentProfile: cloud
      environment: production
      deliveryKind: container-image
      deploymentDriver: kubernetes
      managementModel: sdkwork-managed
      tenancyModel: single-tenant
      isolationModel: dedicated
      networkExposure: public
      rolloutStrategy: rolling
      availabilityMode: high-availability
    install:
      layout: binary-package
    expose: []
    packages: []
    overrides:
      topology:
        spec: specs/topology.spec.json
        profile: cloud.production
        env: etc/topology/cloud.production.env
      kubernetes:
        reference: deployments/kubernetes/
      websiteDelivery:
        servicePattern: sdkwork-web-website-{tenantFleetName}
        providerEventServicePattern: sdkwork-web-events-{tenantFleetName}-{nodeName}
        tenantFleetName: required-opaque-tf-base32-render-input
        tenantScope: node-secret-only
        hostRouting: runtime-set
        tlsRouting: external-ingress
        tlsRuntimeActivation: deferred
        listenerConfig: per-node-immutable-config-map
        trustedProxyCidrs: required-render-input
        customDomains: true

  standalone.production:
    deployment:
      deploymentProfile: standalone
      environment: production
      deliveryKind: host-package
      deploymentDriver: host-service
      managementModel: customer-managed
      tenancyModel: single-tenant
      isolationModel: dedicated
      networkExposure: private
      rolloutStrategy: recreate
      availabilityMode: single-instance
    install:
      layout: binary-package
    expose:
      - domain: web.internal.example
        tls: managed
        mode: api
    packages: []
    overrides:
      topology:
        spec: specs/topology.spec.json
        profile: standalone.production
        env: etc/topology/standalone.production.env
      proxy:
        upstreams:
          application.public-ingress: http://127.0.0.1:3800
          application.app-http: http://127.0.0.1:3800
          application.backend-http: http://127.0.0.1:3800
