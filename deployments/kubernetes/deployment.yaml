apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: sdkwork-api-web-server-standalone-gateway
  labels:
    app.kubernetes.io/name: sdkwork-web-server
    app.kubernetes.io/component: standalone-gateway
    app.kubernetes.io/part-of: sdkwork-web-server
spec:
  serviceName: sdkwork-api-web-server-standalone-gateway-headless
  replicas: 2
  podManagementPolicy: Parallel
  minReadySeconds: 10
  updateStrategy:
    type: RollingUpdate
    rollingUpdate:
      partition: 0
  selector:
    matchLabels:
      app.kubernetes.io/name: sdkwork-web-server
      app.kubernetes.io/component: standalone-gateway
  template:
    metadata:
      labels:
        app.kubernetes.io/name: sdkwork-web-server
        app.kubernetes.io/component: standalone-gateway
        app.kubernetes.io/part-of: sdkwork-web-server
    spec:
      automountServiceAccountToken: false
      terminationGracePeriodSeconds: 60
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
        runAsGroup: 10001
        fsGroup: 10001
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: standalone-gateway
          image: registry.sdkwork.com/apps/sdkwork-web@sha256:__SDKWORK_IMAGE_DIGEST__
          imagePullPolicy: IfNotPresent
          command: ["/bin/sh", "-ec"]
          args:
            - |
              node_id="${HOSTNAME##*-}"
              case "${node_id}" in
                ''|*[!0-9]*) echo "StatefulSet pod ordinal is not numeric" >&2; exit 64 ;;
              esac
              if [ "${node_id}" -gt 1023 ]; then
                echo "StatefulSet pod ordinal exceeds the supported node-id range" >&2
                exit 64
              fi
              export SDKWORK_WEB_SNOWFLAKE_NODE_ID="${node_id}"
              exec /app/bin/sdkwork-api-web-server-standalone-gateway serve-management
          ports:
            - name: http
              containerPort: 3800
              protocol: TCP
          env:
            - name: SDKWORK_WEB_APP_ROOT
              value: /app
            - name: SDKWORK_WEB_ENVIRONMENT
              value: production
            - name: SDKWORK_WEB_CONFIG_PROFILE
              value: production
            - name: SDKWORK_WEB_DEPLOYMENT_PROFILE
              value: cloud
            - name: SDKWORK_WEB_PROFILE_ID
              value: cloud.production
            - name: SDKWORK_WEB_SERVICE_LAYOUT
              value: unified-process
            - name: SDKWORK_WEB_APPLICATION_PUBLIC_INGRESS_BIND
              value: "0.0.0.0:3800"
            - name: SDKWORK_WEB_DATABASE_AUTO_MIGRATE
              value: "false"
            - name: SDKWORK_WEB_DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: sdkwork-web-server-runtime
                  key: database-url
            - name: SDKWORK_IAM_DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: sdkwork-web-server-runtime
                  key: iam-database-url
            - name: SDKWORK_WEB_SECRET_ENCRYPTION_KEY
              valueFrom:
                secretKeyRef:
                  name: sdkwork-web-server-runtime
                  key: secret-encryption-key
            - name: SDKWORK_WEB_CERT_ENCRYPTION_KEY
              valueFrom:
                secretKeyRef:
                  name: sdkwork-web-server-runtime
                  key: certificate-encryption-key
            - name: SDKWORK_WEB_ACME_CONTACT_EMAIL
              valueFrom:
                secretKeyRef:
                  name: sdkwork-web-server-runtime
                  key: acme-contact-email
          startupProbe:
            httpGet:
              path: /healthz
              port: http
            failureThreshold: 30
            periodSeconds: 2
            timeoutSeconds: 1
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            failureThreshold: 3
            periodSeconds: 10
            timeoutSeconds: 2
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            failureThreshold: 3
            periodSeconds: 20
            timeoutSeconds: 2
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: "2"
              memory: 1Gi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          volumeMounts:
            - name: temporary
              mountPath: /tmp
      volumes:
        - name: temporary
          emptyDir:
            sizeLimit: 64Mi
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: sdkwork-api-web-server-standalone-gateway
  labels:
    app.kubernetes.io/name: sdkwork-web-server
    app.kubernetes.io/component: standalone-gateway
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: sdkwork-web-server
      app.kubernetes.io/component: standalone-gateway
