apiVersion: apps/v1
kind: Deployment
metadata:
  name: sdkwork-web-standalone-gateway
  labels:
    app.kubernetes.io/name: sdkwork-web
    app.kubernetes.io/component: standalone-gateway
    app.kubernetes.io/part-of: sdkwork-web
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: sdkwork-web
      app.kubernetes.io/component: standalone-gateway
  template:
    metadata:
      labels:
        app.kubernetes.io/name: sdkwork-web
        app.kubernetes.io/component: standalone-gateway
        app.kubernetes.io/part-of: sdkwork-web
    spec:
      containers:
        - name: standalone-gateway
          image: sdkwork-web-standalone-gateway:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 3800
              protocol: TCP
          env:
            - name: SDKWORK_WEB_APP_ROOT
              value: /app
            - name: SDKWORK_WEB_ENVIRONMENT
              value: production
            - name: SDKWORK_WEB_CONFIG_PROFILE
              value: production
            - name: SDKWORK_WEB_DEPLOYMENT_PROFILE
              value: cloud
            - name: SDKWORK_WEB_SERVICE_LAYOUT
              value: unified-process
            - name: SDKWORK_WEB_APPLICATION_PUBLIC_INGRESS_BIND
              value: "0.0.0.0:3800"
            - name: SDKWORK_WEB_SNOWFLAKE_NODE_ID
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: SDKWORK_WEB_DATABASE_AUTO_MIGRATE
              value: "false"
            - name: SDKWORK_WEB_DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: sdkwork-web-database
                  key: database-url
            - name: SDKWORK_IAM_DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: sdkwork-web-iam-database
                  key: database-url
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: "2"
              memory: 1Gi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
            runAsNonRoot: true
            runAsUser: 10001
            capabilities:
              drop:
                - ALL
      terminationGracePeriodSeconds: 30
