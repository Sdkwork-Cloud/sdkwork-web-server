apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: sdkwork-web-node-__SDKWORK_WEBSITE_TENANT_FLEET_NAME__-__SDKWORK_WEBSITE_NODE_NAME__
  labels:
    app.kubernetes.io/name: sdkwork-web-server
    app.kubernetes.io/component: website-data-plane
    app.kubernetes.io/part-of: sdkwork-web-server
    sdkwork.com/tenant-fleet: __SDKWORK_WEBSITE_TENANT_FLEET_NAME__
    sdkwork.com/web-node: __SDKWORK_WEBSITE_NODE_NAME__
spec:
  serviceName: sdkwork-web-website-__SDKWORK_WEBSITE_TENANT_FLEET_NAME__-headless
  replicas: 1
  podManagementPolicy: OrderedReady
  minReadySeconds: 10
  updateStrategy:
    type: RollingUpdate
  selector:
    matchLabels:
      app.kubernetes.io/name: sdkwork-web-server
      app.kubernetes.io/component: website-data-plane
      sdkwork.com/tenant-fleet: __SDKWORK_WEBSITE_TENANT_FLEET_NAME__
      sdkwork.com/web-node: __SDKWORK_WEBSITE_NODE_NAME__
  template:
    metadata:
      labels:
        app.kubernetes.io/name: sdkwork-web-server
        app.kubernetes.io/component: website-data-plane
        app.kubernetes.io/part-of: sdkwork-web-server
        sdkwork.com/tenant-fleet: __SDKWORK_WEBSITE_TENANT_FLEET_NAME__
        sdkwork.com/web-node: __SDKWORK_WEBSITE_NODE_NAME__
    spec:
      automountServiceAccountToken: false
      enableServiceLinks: false
      terminationGracePeriodSeconds: 60
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: DoNotSchedule
          labelSelector:
            matchLabels:
              app.kubernetes.io/name: sdkwork-web-server
              app.kubernetes.io/component: website-data-plane
              sdkwork.com/tenant-fleet: __SDKWORK_WEBSITE_TENANT_FLEET_NAME__
        - maxSkew: 1
          topologyKey: topology.kubernetes.io/zone
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              app.kubernetes.io/name: sdkwork-web-server
              app.kubernetes.io/component: website-data-plane
              sdkwork.com/tenant-fleet: __SDKWORK_WEBSITE_TENANT_FLEET_NAME__
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
        runAsGroup: 10001
        fsGroup: 10001
        fsGroupChangePolicy: OnRootMismatch
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: website-data-plane
          image: registry.sdkwork.com/apps/sdkwork-web@sha256:__SDKWORK_IMAGE_DIGEST__
          imagePullPolicy: IfNotPresent
          command:
            - /app/bin/sdkwork-web-server-website-delivery-edge-runtime
          ports:
            - name: website-http
              containerPort: 8080
              protocol: TCP
          env:
            - name: SDKWORK_WEB_APP_ROOT
              value: /app
            - name: SDKWORK_WEB_ENVIRONMENT
              value: production
            - name: SDKWORK_WEB_CONFIG_PROFILE
              value: production
            - name: SDKWORK_WEB_DEPLOYMENT_PROFILE
              value: cloud
            - name: SDKWORK_WEB_PROFILE_ID
              value: cloud.production
            - name: SDKWORK_WEB_RUNTIME_TARGET
              value: container
            - name: SDKWORK_WEB_SERVICE_LAYOUT
              value: website-data-plane
            - name: SDKWORK_WEB_SERVER_CONFIG_FILE
              value: /etc/sdkwork/web/sdkwork.webserver.config.json
            - name: SDKWORK_WEB_RUNTIME_ASSIGNMENT_SOURCE
              value: cloud
            - name: SDKWORK_WEB_INTERNAL_API_BASE_URL
              value: https://web.sdkwork.com
            - name: SDKWORK_WEB_NODE_UUID
              valueFrom:
                secretKeyRef:
                  name: __SDKWORK_WEBSITE_NODE_SECRET_NAME__
                  key: node-uuid
            - name: SDKWORK_WEB_NODE_TOKEN_FILE
              value: /run/secrets/sdkwork-web-node/node-token
            - name: SDKWORK_WEB_WEBSITE_RUNTIME_ENVIRONMENT
              value: production
            - name: SDKWORK_WEB_WEBSITE_RUNTIME_SET_RECOVERY_DIRECTORY
              value: /var/lib/sdkwork/web/website-runtime-recovery
            - name: SDKWORK_WEB_WEBSITE_RUNTIME_SET_POLL_INTERVAL_MS
              value: "2000"
            - name: SDKWORK_WEB_WEBSITE_TENANT_SCOPE_HASH
              valueFrom:
                secretKeyRef:
                  name: __SDKWORK_WEBSITE_NODE_SECRET_NAME__
                  key: tenant-scope-hash
            - name: SDKWORK_WEB_WEBSITE_PROVIDER_VALIDATION_CONCURRENCY
              value: "16"
            - name: SDKWORK_WEB_WEBSITE_PROVIDER_EVENT_CONFIG_FILE
              value: /run/secrets/sdkwork-web-node/website-provider-events.json
            - name: SDKWORK_WEBSERVER_DRIVE_INTERNAL_API_BASE_URL
              value: https://drive-internal.sdkwork.com
            - name: SDKWORK_WEBSERVER_DRIVE_INTERNAL_API_INGRESS_TOKEN_FILE
              value: /run/secrets/sdkwork-web-node/drive-ingress-token
            - name: SDKWORK_WEBSERVER_KNOWLEDGEBASE_INTERNAL_API_BASE_URL
              value: https://knowledgebase.sdkwork.com
            - name: SDKWORK_WEBSERVER_KNOWLEDGEBASE_INTERNAL_API_INGRESS_TOKEN_FILE
              value: /run/secrets/sdkwork-web-node/knowledgebase-ingress-token
            - name: SDKWORK_WEB_DATA_PLANE_OPERATIONS_BIND
              value: 127.0.0.1:3901
          startupProbe:
            exec:
              command:
                - /app/bin/sdkwork-web-server-website-delivery-edge-runtime
                - probe
                - /healthz
            failureThreshold: 60
            periodSeconds: 2
            timeoutSeconds: 4
          readinessProbe:
            exec:
              command:
                - /app/bin/sdkwork-web-server-website-delivery-edge-runtime
                - probe
                - /readyz
            failureThreshold: 3
            periodSeconds: 10
            timeoutSeconds: 4
          livenessProbe:
            exec:
              command:
                - /app/bin/sdkwork-web-server-website-delivery-edge-runtime
                - probe
                - /livez
            failureThreshold: 3
            periodSeconds: 20
            timeoutSeconds: 4
          resources:
            requests:
              cpu: 500m
              memory: 512Mi
              ephemeral-storage: 128Mi
            limits:
              cpu: "2"
              memory: 1Gi
              ephemeral-storage: 256Mi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          volumeMounts:
            - name: host-config
              mountPath: /etc/sdkwork/web
              readOnly: true
            - name: node-secrets
              mountPath: /run/secrets/sdkwork-web-node
              readOnly: true
            - name: recovery
              mountPath: /var/lib/sdkwork/web
            - name: temporary
              mountPath: /tmp
        - name: provider-event-relay
          image: registry.sdkwork.com/apps/sdkwork-web@sha256:__SDKWORK_IMAGE_DIGEST__
          imagePullPolicy: IfNotPresent
          command:
            - /app/bin/sdkwork-web-server-website-delivery-edge-runtime
            - relay-provider-events
          ports:
            - name: provider-events
              containerPort: 3811
              protocol: TCP
          env:
            - name: SDKWORK_WEB_WEBSITE_PROVIDER_EVENT_RELAY_BIND
              value: 0.0.0.0:3811
            - name: SDKWORK_WEB_WEBSITE_PROVIDER_EVENT_RELAY_TARGET
              value: 127.0.0.1:3810
          startupProbe:
            tcpSocket:
              port: provider-events
            failureThreshold: 30
            periodSeconds: 2
            timeoutSeconds: 1
          readinessProbe:
            tcpSocket:
              port: provider-events
            failureThreshold: 3
            periodSeconds: 10
            timeoutSeconds: 1
          livenessProbe:
            tcpSocket:
              port: provider-events
            failureThreshold: 3
            periodSeconds: 20
            timeoutSeconds: 1
          resources:
            requests:
              cpu: 25m
              memory: 32Mi
              ephemeral-storage: 16Mi
            limits:
              cpu: 250m
              memory: 64Mi
              ephemeral-storage: 64Mi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
      volumes:
        - name: host-config
          configMap:
            name: __SDKWORK_WEBSITE_CONFIG_MAP_NAME__
            items:
              - key: sdkwork.webserver.config.json
                path: sdkwork.webserver.config.json
        - name: node-secrets
          secret:
            secretName: __SDKWORK_WEBSITE_NODE_SECRET_NAME__
            defaultMode: 0440
        - name: temporary
          emptyDir:
            sizeLimit: 64Mi
  volumeClaimTemplates:
    - metadata:
        name: recovery
        labels:
          app.kubernetes.io/name: sdkwork-web-server
          app.kubernetes.io/component: website-data-plane
          sdkwork.com/tenant-fleet: __SDKWORK_WEBSITE_TENANT_FLEET_NAME__
      spec:
        accessModes:
          - ReadWriteOnce
        resources:
          requests:
            storage: 1Gi
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: sdkwork-web-website-__SDKWORK_WEBSITE_TENANT_FLEET_NAME__
  labels:
    app.kubernetes.io/name: sdkwork-web-server
    app.kubernetes.io/component: website-data-plane
    sdkwork.com/tenant-fleet: __SDKWORK_WEBSITE_TENANT_FLEET_NAME__
spec:
  maxUnavailable: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: sdkwork-web-server
      app.kubernetes.io/component: website-data-plane
      sdkwork.com/tenant-fleet: __SDKWORK_WEBSITE_TENANT_FLEET_NAME__
