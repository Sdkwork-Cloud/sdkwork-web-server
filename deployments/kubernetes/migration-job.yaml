apiVersion: batch/v1
kind: Job
metadata:
  name: sdkwork-web-db-migrate
  labels:
    app.kubernetes.io/name: sdkwork-web
    app.kubernetes.io/component: db-migrate
spec:
  backoffLimit: 3
  template:
    metadata:
      labels:
        app.kubernetes.io/name: sdkwork-web
        app.kubernetes.io/component: db-migrate
    spec:
      restartPolicy: OnFailure
      containers:
        - name: migrate
          image: sdkwork-web-standalone-gateway:latest
          command: ["sdkwork-web-standalone-gateway", "db-migrate"]
          env:
            - name: SDKWORK_WEB_APP_ROOT
              value: /app
            - name: SDKWORK_WEB_ENVIRONMENT
              value: production
            - name: SDKWORK_WEB_DATABASE_AUTO_MIGRATE
              value: "true"
            - name: SDKWORK_WEB_DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: sdkwork-web-database
                  key: database-url
