daemon off;
master_process off;
error_log stderr notice;

events {
    worker_connections 64;
}

http {
    access_log off;

    server {
        listen 127.0.0.1:19876;
        server_name localhost;

        location / {
            default_type text/plain;
            return 200 "$uri|$request_uri\n";
        }
    }
}
