daemon off;
master_process off;
pid logs/sdkwork-pipeline.pid;
error_log stderr notice;

events {
    worker_connections 128;
}

http {
    access_log off;

    server {
        listen 127.0.0.1:19877;
        server_name localhost;

        location / {
            default_type text/plain;
            return 200 "pipeline-ok\n";
        }
    }
}
