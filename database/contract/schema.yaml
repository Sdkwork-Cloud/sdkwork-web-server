schema_version: 1
kind: sdkwork.database.schema
module_id: web
contract_version: 1.0.0
owner_team: web-platform
compliance_level: L2
engines:
  - postgres
  - sqlite
table_prefix: web_
serialization:
  int64: string
  decimal: string
  time: iso8601_utc
tables:
  - table_name: web_site
    table_profile: site_registry
    owner_team: web-platform
    compliance_level: L2
    lifecycle_status: active
    columns:
      id: { type: int64, required: true, primary_key: true }
      uuid: { type: string, length: 64, required: true, unique: true }
      tenant_id: { type: int64, required: true }
      organization_id: { type: int64, required: true, default: 0 }
      data_scope: { type: enum_int32, required: true, default: 1 }
      user_id: { type: int64, required: false }
      name: { type: string, length: 100, required: true }
      slug: { type: string, length: 100, required: true }
      description: { type: string, length: 500, required: false }
      site_type: { type: enum_int32, required: true, default: 1 }
      status: { type: enum_int32, required: true, default: 0 }
      runtime_config: { type: json, required: true, default: "{}" }
      metadata: { type: json, required: true, default: "{}" }
      created_at: { type: instant, required: true }
      updated_at: { type: instant, required: true }
      version: { type: int64, required: true, default: 0 }
      deleted_at: { type: instant, required: false }
      deleted_by: { type: int64, required: false }
    constraints:
      - name: uk_web_site_uuid
        type: unique
        columns: [uuid]
      - name: uk_web_site_slug
        type: unique
        columns: [tenant_id, slug]
      - name: chk_web_site_type
        type: check
        expression: site_type BETWEEN 1 AND 6
      - name: chk_web_site_status
        type: check
        expression: status BETWEEN 0 AND 3
    indexes:
      - name: uk_web_site_uuid
        unique: true
        columns: [uuid]
      - name: uk_web_site_slug
        unique: true
        columns: [tenant_id, slug]
      - name: idx_web_site_tenant_status_updated
        columns: [tenant_id, organization_id, status, updated_at]
      - name: idx_web_site_user_updated
        columns: [tenant_id, user_id, updated_at]
      - name: idx_web_site_slug
        columns: [tenant_id, slug]
    ownership:
      tenant: required
      organization: default_zero

  - table_name: web_domain
    table_profile: domain_registry
    owner_team: web-platform
    compliance_level: L2
    lifecycle_status: active
    columns:
      id: { type: int64, required: true, primary_key: true }
      uuid: { type: string, length: 64, required: true, unique: true }
      tenant_id: { type: int64, required: true }
      organization_id: { type: int64, required: true, default: 0 }
      site_id: { type: int64, required: true }
      hostname: { type: string, length: 255, required: true }
      is_primary: { type: bool, required: true, default: false }
      is_verified: { type: bool, required: true, default: false }
      verify_token: { type: string, length: 128, required: false }
      ssl_enabled: { type: bool, required: true, default: false }
      ssl_provider: { type: string, length: 32, required: false }
      redirect_target: { type: string, length: 2000, required: false }
      status: { type: enum_int32, required: true, default: 0 }
      metadata: { type: json, required: true, default: "{}" }
      created_at: { type: instant, required: true }
      updated_at: { type: instant, required: true }
      version: { type: int64, required: true, default: 0 }
      deleted_at: { type: instant, required: false }
    constraints:
      - name: uk_web_domain_uuid
        type: unique
        columns: [uuid]
      - name: uk_web_domain_hostname
        type: unique
        columns: [hostname]
      - name: fk_web_domain_site
        type: foreign_key
        columns: [site_id]
        references: web_site(id)
    indexes:
      - name: uk_web_domain_uuid
        unique: true
        columns: [uuid]
      - name: uk_web_domain_hostname
        unique: true
        columns: [hostname]
      - name: idx_web_domain_site
        columns: [site_id]
      - name: idx_web_domain_tenant_status
        columns: [tenant_id, status]
    ownership:
      tenant: required
      organization: default_zero

  - table_name: web_nginx_config
    table_profile: config_artifact
    owner_team: web-platform
    compliance_level: L2
    lifecycle_status: active
    columns:
      id: { type: int64, required: true, primary_key: true }
      uuid: { type: string, length: 64, required: true, unique: true }
      tenant_id: { type: int64, required: true }
      site_id: { type: int64, required: true }
      domain_id: { type: int64, required: false }
      config_type: { type: enum_int32, required: true, default: 1 }
      config_name: { type: string, length: 200, required: true }
      config_content: { type: text, required: true }
      config_hash: { type: string, length: 64, required: true }
      is_active: { type: bool, required: true, default: false }
      version_no: { type: int32, required: true, default: 1 }
      deployed_at: { type: instant, required: false }
      status: { type: enum_int32, required: true, default: 0 }
      metadata: { type: json, required: true, default: "{}" }
      created_at: { type: instant, required: true }
      updated_at: { type: instant, required: true }
      version: { type: int64, required: true, default: 0 }
    constraints:
      - name: uk_web_nginx_config_uuid
        type: unique
        columns: [uuid]
      - name: fk_web_nginx_config_site
        type: foreign_key
        columns: [site_id]
        references: web_site(id)
    indexes:
      - name: uk_web_nginx_config_uuid
        unique: true
        columns: [uuid]
      - name: idx_web_nginx_config_site_active
        columns: [site_id, is_active]
      - name: idx_web_nginx_config_type_status
        columns: [config_type, status]
    ownership:
      tenant: required

  - table_name: web_certificate
    table_profile: certificate_registry
    owner_team: web-platform
    compliance_level: L2
    lifecycle_status: active
    columns:
      id: { type: int64, required: true, primary_key: true }
      uuid: { type: string, length: 64, required: true, unique: true }
      tenant_id: { type: int64, required: true }
      domain_id: { type: int64, required: false }
      site_id: { type: int64, required: false }
      cert_name: { type: string, length: 200, required: true }
      cert_type: { type: enum_int32, required: true, default: 1 }
      issuer: { type: string, length: 200, required: false }
      subject: { type: string, length: 500, required: false }
      san_list: { type: text, required: false }
      fingerprint: { type: string, length: 128, required: false }
      cert_path: { type: string, length: 500, required: false }
      key_path: { type: string, length: 500, required: false }
      chain_path: { type: string, length: 500, required: false }
      not_before: { type: instant, required: false }
      not_after: { type: instant, required: false }
      auto_renew: { type: bool, required: true, default: true }
      renewal_status: { type: enum_int32, required: true, default: 0 }
      status: { type: enum_int32, required: true, default: 0 }
      metadata: { type: json, required: true, default: "{}" }
      created_at: { type: instant, required: true }
      updated_at: { type: instant, required: true }
      version: { type: int64, required: true, default: 0 }
    constraints:
      - name: uk_web_certificate_uuid
        type: unique
        columns: [uuid]
    indexes:
      - name: uk_web_certificate_uuid
        unique: true
        columns: [uuid]
      - name: idx_web_certificate_domain
        columns: [domain_id]
      - name: idx_web_certificate_expiry
        columns: [not_after]
        partial: status = 1
      - name: idx_web_certificate_renewal
        columns: [renewal_status, not_after]
        partial: auto_renew = true AND status = 1
    ownership:
      tenant: required

  - table_name: web_deployment
    table_profile: deployment_record
    owner_team: web-platform
    compliance_level: L2
    lifecycle_status: active
    columns:
      id: { type: int64, required: true, primary_key: true }
      uuid: { type: string, length: 64, required: true, unique: true }
      tenant_id: { type: int64, required: true }
      organization_id: { type: int64, required: true, default: 0 }
      user_id: { type: int64, required: false }
      site_id: { type: int64, required: true }
      deploy_type: { type: enum_int32, required: true, default: 1 }
      version_tag: { type: string, length: 100, required: false }
      commit_hash: { type: string, length: 64, required: false }
      source_ref: { type: string, length: 500, required: false }
      build_log: { type: text, required: false }
      deploy_log: { type: text, required: false }
      artifact_path: { type: string, length: 500, required: false }
      artifact_size: { type: int64, required: false }
      artifact_hash: { type: string, length: 64, required: false }
      environment: { type: string, length: 32, required: true, default: production }
      status: { type: enum_int32, required: true, default: 0 }
      started_at: { type: instant, required: false }
      completed_at: { type: instant, required: false }
      duration_ms: { type: int64, required: false }
      rollback_from: { type: int64, required: false }
      idempotency_key: { type: string, length: 200, required: false }
      request_id: { type: string, length: 128, required: false }
      metadata: { type: json, required: true, default: "{}" }
      created_at: { type: instant, required: true }
      updated_at: { type: instant, required: true }
      version: { type: int64, required: true, default: 0 }
    constraints:
      - name: uk_web_deployment_uuid
        type: unique
        columns: [uuid]
      - name: uk_web_deployment_idempotency
        type: unique
        columns: [tenant_id, idempotency_key]
      - name: fk_web_deployment_site
        type: foreign_key
        columns: [site_id]
        references: web_site(id)
    indexes:
      - name: uk_web_deployment_uuid
        unique: true
        columns: [uuid]
      - name: uk_web_deployment_idempotency
        unique: true
        columns: [tenant_id, idempotency_key]
      - name: idx_web_deployment_site_created
        columns: [site_id, created_at]
      - name: idx_web_deployment_tenant_status
        columns: [tenant_id, status, created_at]
      - name: idx_web_deployment_status
        columns: [status]
        partial: status IN (0, 1, 2)
    ownership:
      tenant: required
      organization: default_zero

  - table_name: web_env_variable
    table_profile: env_variable
    owner_team: web-platform
    compliance_level: L2
    lifecycle_status: active
    columns:
      id: { type: int64, required: true, primary_key: true }
      uuid: { type: string, length: 64, required: true, unique: true }
      tenant_id: { type: int64, required: true }
      site_id: { type: int64, required: true }
      environment: { type: string, length: 32, required: true, default: production }
      key: { type: string, length: 200, required: true }
      value_encrypted: { type: text, required: true }
      is_secret: { type: bool, required: true, default: true }
      status: { type: enum_int32, required: true, default: 1 }
      created_at: { type: instant, required: true }
      updated_at: { type: instant, required: true }
      version: { type: int64, required: true, default: 0 }
    constraints:
      - name: uk_web_env_variable_uuid
        type: unique
        columns: [uuid]
      - name: uk_web_env_variable_key
        type: unique
        columns: [site_id, environment, key]
    indexes:
      - name: uk_web_env_variable_uuid
        unique: true
        columns: [uuid]
      - name: uk_web_env_variable_key
        unique: true
        columns: [site_id, environment, key]
      - name: idx_web_env_variable_site_env
        columns: [site_id, environment]
    ownership:
      tenant: required

  - table_name: web_health_check
    table_profile: health_check_config
    owner_team: web-platform
    compliance_level: L2
    lifecycle_status: active
    columns:
      id: { type: int64, required: true, primary_key: true }
      uuid: { type: string, length: 64, required: true, unique: true }
      tenant_id: { type: int64, required: true }
      site_id: { type: int64, required: true }
      domain_id: { type: int64, required: false }
      check_type: { type: enum_int32, required: true, default: 1 }
      check_url: { type: string, length: 2000, required: false }
      check_interval: { type: int32, required: true, default: 60 }
      timeout_ms: { type: int32, required: true, default: 5000 }
      retry_count: { type: int32, required: true, default: 3 }
      expected_status: { type: int32, required: false }
      expected_body: { type: string, length: 500, required: false }
      status: { type: enum_int32, required: true, default: 1 }
      created_at: { type: instant, required: true }
      updated_at: { type: instant, required: true }
      version: { type: int64, required: true, default: 0 }
    constraints:
      - name: uk_web_health_check_uuid
        type: unique
        columns: [uuid]
      - name: fk_web_health_check_site
        type: foreign_key
        columns: [site_id]
        references: web_site(id)
    indexes:
      - name: uk_web_health_check_uuid
        unique: true
        columns: [uuid]
      - name: idx_web_health_check_site
        columns: [site_id]
    ownership:
      tenant: required

  - table_name: web_health_result
    table_profile: health_check_result
    owner_team: web-platform
    compliance_level: L2
    lifecycle_status: active
    columns:
      id: { type: int64, required: true, primary_key: true }
      uuid: { type: string, length: 64, required: true, unique: true }
      tenant_id: { type: int64, required: true }
      health_check_id: { type: int64, required: true }
      site_id: { type: int64, required: true }
      is_healthy: { type: bool, required: true }
      response_ms: { type: int32, required: false }
      status_code: { type: int32, required: false }
      error_message: { type: string, length: 1000, required: false }
      checked_at: { type: instant, required: true }
      created_at: { type: instant, required: true }
    indexes:
      - name: idx_web_health_result_check_time
        columns: [health_check_id, checked_at]
      - name: idx_web_health_result_site_time
        columns: [site_id, checked_at]
    ownership:
      tenant: required

  - table_name: web_audit_log
    table_profile: audit_log
    owner_team: web-platform
    compliance_level: L2
    lifecycle_status: active
    columns:
      id: { type: int64, required: true, primary_key: true }
      uuid: { type: string, length: 64, required: true, unique: true }
      tenant_id: { type: int64, required: true }
      organization_id: { type: int64, required: true, default: 0 }
      operator_id: { type: int64, required: true }
      operator_type: { type: string, length: 32, required: true, default: USER }
      action: { type: string, length: 100, required: true }
      target_type: { type: string, length: 100, required: true }
      target_id: { type: int64, required: false }
      target_uuid: { type: string, length: 64, required: false }
      request_id: { type: string, length: 128, required: false }
      ip_address: { type: string, length: 45, required: false }
      user_agent: { type: string, length: 500, required: false }
      changes: { type: json, required: false }
      metadata: { type: json, required: true, default: "{}" }
      created_at: { type: instant, required: true }
    indexes:
      - name: idx_web_audit_log_target
        columns: [target_type, target_id, created_at]
      - name: idx_web_audit_log_operator
        columns: [operator_id, created_at]
      - name: idx_web_audit_log_tenant_action
        columns: [tenant_id, action, created_at]
    ownership:
      tenant: required
      organization: default_zero

  - table_name: web_server
    table_profile: server_registry
    owner_team: web-platform
    compliance_level: L2
    lifecycle_status: active
    columns:
      id: { type: int64, required: true, primary_key: true }
      uuid: { type: string, length: 64, required: true, unique: true }
      tenant_id: { type: int64, required: true }
      name: { type: string, length: 200, required: true }
      host: { type: string, length: 255, required: true }
      ssh_port: { type: int32, required: true, default: 22 }
      status: { type: enum_int32, required: true, default: 0 }
      metadata: { type: json, required: true, default: "{}" }
      created_at: { type: instant, required: true }
      updated_at: { type: instant, required: true }
      version: { type: int64, required: true, default: 0 }
    constraints:
      - name: uk_web_server_uuid
        type: unique
        columns: [uuid]
      - name: uk_web_server_host
        type: unique
        columns: [tenant_id, host]
    indexes:
      - name: uk_web_server_uuid
        unique: true
        columns: [uuid]
      - name: uk_web_server_host
        unique: true
        columns: [tenant_id, host]
      - name: idx_web_server_tenant_status
        columns: [tenant_id, status, updated_at]
    ownership:
      tenant: required
