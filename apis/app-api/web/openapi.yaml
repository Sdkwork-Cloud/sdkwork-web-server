      summary: 申请证书
      tags: [certificate]
      security:
        - AuthToken: []
          AccessToken: []
      x-sdkwork-api-surface: app-api
      x-sdkwork-api-authority: sdkwork-web.app
      x-sdkwork-request-context: WebRequestContext
      x-sdkwork-auth-mode: dual-token
      x-sdkwork-permission: web.certificates.write
      x-sdkwork-idempotent: true
      x-sdkwork-owner: sdkwork-web-server
      x-sdkwork-rate-limit-tier: auth-critical
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateCertificateRequest'
      responses:
        '201':
          description: 证书申请已触发
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CertificateResponse'

  /app/v3/api/sites/{siteId}/health_checks:
    parameters:
      - $ref: '#/components/parameters/SiteIdParam'
    get:
      operationId: sites.healthChecks.list
      summary: 获取健康检查配置
      tags: [monitor]
      security:
        - AuthToken: []
          AccessToken: []
      x-sdkwork-api-surface: app-api
      x-sdkwork-api-authority: sdkwork-web.app
      x-sdkwork-request-context: WebRequestContext
      x-sdkwork-auth-mode: dual-token
      x-sdkwork-permission: web.sites.write
      x-sdkwork-owner: sdkwork-web-server
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthCheckPage'
    post:
      operationId: sites.healthChecks.create
      summary: 创建健康检查
      tags: [monitor]
      security:
        - AuthToken: []
          AccessToken: []
      x-sdkwork-api-surface: app-api
      x-sdkwork-api-authority: sdkwork-web.app
      x-sdkwork-request-context: WebRequestContext
      x-sdkwork-auth-mode: dual-token
      x-sdkwork-permission: web.sites.write
      x-sdkwork-idempotent: true
      x-sdkwork-owner: sdkwork-web-server
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateHealthCheckRequest'
      responses:
        '201':
          description: 创建成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthCheckResponse'

components:
  securitySchemes:
    AuthToken:
      type: http
      scheme: bearer
      bearerFormat: JWT
    AccessToken:
      type: apiKey
      in: header
      name: Access-Token
    ApiKey:
      type: apiKey
      in: header
      name: X-API-Key

  parameters:
    PageParam:
      name: page
      in: query
      schema:
        type: integer
        minimum: 1
        default: 1
    PageSizeParam:
      name: pageSize
      in: query
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 20
    SiteIdParam:
      name: siteId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    DomainIdParam:
      name: domainId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    DeploymentIdParam:
      name: deploymentId
      in: path
      required: true
      schema:
        type: string
        format: uuid

  schemas:
    ProblemDetail:
      type: object
      properties:
        type:
          type: string
          format: uri
        title:
          type: string
        status:
          type: integer
        detail:
          type: string
        instance:
          type: string
        requestId:
          type: string

    CreateSiteRequest:
      type: object
      required: [name, siteType]
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 100
        slug:
          type: string
          minLength: 1
          maxLength: 100
          pattern: '^[a-z0-9][a-z0-9\-]*[a-z0-9]$'
        description:
          type: string
          maxLength: 500
        siteType:
          type: integer
          enum: [1, 2, 3, 4, 5, 6]
        runtimeConfig:
          type: object
          properties:
            buildCommand:
              type: string
            outputDirectory:
              type: string
            nodeVersion:
              type: string
            installCommand:
              type: string
            startCommand:
              type: string

    UpdateSiteRequest:
      type: object
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 100
        description:
          type: string
          maxLength: 500
        runtimeConfig:
          type: object

    SiteResponse:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        slug:
          type: string
        description:
          type: string
        siteType:
          type: integer
        status:
          type: integer
        runtimeConfig:
          type: object
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    SitePage:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/SiteResponse'
        total:
          type: string
          format: int64
          pattern: '^[0-9]+$'
          x-sdkwork-int64-string: true
          x-sdkwork-rust-type: i64
          description: Total item count as a string to avoid JavaScript precision loss.
        page:
          type: integer
        pageSize:
          type: integer

    CreateDomainRequest:
      type: object
      required: [hostname]
      properties:
        hostname:
          type: string
          maxLength: 255
        isPrimary:
          type: boolean
          default: false
        sslEnabled:
          type: boolean
          default: true
        sslProvider:
          type: string
          enum: [letsencrypt, custom, none]

    DomainResponse:
      type: object
      properties:
        id:
          type: string
          format: uuid
        hostname:
          type: string
        isPrimary:
          type: boolean
        isVerified:
          type: boolean
        sslEnabled:
          type: boolean
        sslProvider:
          type: string
        status:
          type: integer
        createdAt:
          type: string
          format: date-time

    DomainPage:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/DomainResponse'
        total:
          type: string
          format: int64
          pattern: '^[0-9]+$'
          x-sdkwork-int64-string: true
          x-sdkwork-rust-type: i64
          description: Total item count as a string to avoid JavaScript precision loss.

    DomainVerifyResponse:
      type: object
      properties:
        verified:
          type: boolean
        method:
          type: string
        token:
          type: string

    CreateDeploymentRequest:
      type: object
      required: [deployType]
      properties:
