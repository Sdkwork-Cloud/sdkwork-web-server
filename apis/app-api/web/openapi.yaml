openapi: 3.1.2
info:
  title: SDKWork Web App API
  description: SDKWork Web Server 应用端 API，供前端应用客户端调用
  version: 1.0.0
  contact:
    name: SDKWork Team
servers:
  - url: https://api.web.sdkwork.com
    description: Production
  - url: http://localhost:3800
    description: Local Development

security:
  - AuthToken: []
    AccessToken: []

paths:
  /app/v3/api/sites:
    get:
      operationId: sites.list
      summary: 获取站点列表
      tags: [site]
      security:
        - AuthToken: []
          AccessToken: []
      x-sdkwork-api-surface: app-api
      x-sdkwork-api-authority: sdkwork-web.app
      x-sdkwork-request-context: WebRequestContext
      x-sdkwork-auth-mode: dual-token
      x-sdkwork-permission: web.sites.read
      x-sdkwork-owner: sdkwork-web-server
      parameters:
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/PageSizeParam'
        - name: status
          in: query
          schema:
            type: integer
            enum: [0, 1, 2, 3]
        - name: siteType
          in: query
          schema:
            type: integer
            enum: [1, 2, 3, 4, 5, 6]
        - name: keyword
          in: query
          schema:
            type: string
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SitePage'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '429':
          $ref: '#/components/responses/RateLimited'
    post:
      operationId: sites.create
      summary: 创建站点
      tags: [site]
      security:
        - AuthToken: []
          AccessToken: []
      x-sdkwork-api-surface: app-api
      x-sdkwork-api-authority: sdkwork-web.app
      x-sdkwork-request-context: WebRequestContext
      x-sdkwork-auth-mode: dual-token
      x-sdkwork-permission: web.sites.write
      x-sdkwork-idempotent: true
      x-sdkwork-owner: sdkwork-web-server
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateSiteRequest'
      responses:
        '201':
          description: 创建成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SiteResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '409':
          $ref: '#/components/responses/Conflict'
        '422':
          $ref: '#/components/responses/ValidationError'

  /app/v3/api/sites/{siteId}:
    parameters:
      - $ref: '#/components/parameters/SiteIdParam'
    get:
      operationId: sites.retrieve
      summary: 获取站点详情
      tags: [site]
      security:
        - AuthToken: []
          AccessToken: []
      x-sdkwork-api-surface: app-api
      x-sdkwork-api-authority: sdkwork-web.app
      x-sdkwork-request-context: WebRequestContext
      x-sdkwork-auth-mode: dual-token
      x-sdkwork-permission: web.sites.read
      x-sdkwork-owner: sdkwork-web-server
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SiteResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
    patch:
      operationId: sites.update
      summary: 更新站点
      tags: [site]
      security:
        - AuthToken: []
          AccessToken: []
      x-sdkwork-api-surface: app-api
      x-sdkwork-api-authority: sdkwork-web.app
      x-sdkwork-request-context: WebRequestContext
      x-sdkwork-auth-mode: dual-token
      x-sdkwork-permission: web.sites.write
      x-sdkwork-owner: sdkwork-web-server
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateSiteRequest'
      responses:
        '200':
          description: 更新成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SiteResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '422':
          $ref: '#/components/responses/ValidationError'
    delete:
      operationId: sites.delete
      summary: 删除站点
      tags: [site]
      security:
        - AuthToken: []
          AccessToken: []
      x-sdkwork-api-surface: app-api
      x-sdkwork-api-authority: sdkwork-web.app
      x-sdkwork-request-context: WebRequestContext
      x-sdkwork-auth-mode: dual-token
      x-sdkwork-permission: web.sites.write
      x-sdkwork-owner: sdkwork-web-server
      responses:
        '204':
          description: 删除成功
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  /app/v3/api/sites/{siteId}/activate:
    parameters:
      - $ref: '#/components/parameters/SiteIdParam'
    post:
      operationId: sites.activate
      summary: 激活站点
      tags: [site]
      security:
        - AuthToken: []
          AccessToken: []
      x-sdkwork-api-surface: app-api
      x-sdkwork-api-authority: sdkwork-web.app
      x-sdkwork-request-context: WebRequestContext
      x-sdkwork-auth-mode: dual-token
      x-sdkwork-permission: web.sites.write
      x-sdkwork-owner: sdkwork-web-server
      responses:
        '200':
          description: 激活成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SiteResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  /app/v3/api/sites/{siteId}/pause:
    parameters:
      - $ref: '#/components/parameters/SiteIdParam'
    post:
      operationId: sites.pause
      summary: 暂停站点
      tags: [site]
      security:
        - AuthToken: []
          AccessToken: []
      x-sdkwork-api-surface: app-api
      x-sdkwork-api-authority: sdkwork-web.app
      x-sdkwork-request-context: WebRequestContext
      x-sdkwork-auth-mode: dual-token
      x-sdkwork-permission: web.sites.write
      x-sdkwork-owner: sdkwork-web-server
      responses:
        '200':
          description: 暂停成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SiteResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  /app/v3/api/sites/{siteId}/domains:
    parameters:
      - $ref: '#/components/parameters/SiteIdParam'
    get:
      operationId: sites.domains.list
      summary: 获取站点域名列表
      tags: [domain]
      security:
        - AuthToken: []
          AccessToken: []
      x-sdkwork-api-surface: app-api
      x-sdkwork-api-authority: sdkwork-web.app
      x-sdkwork-request-context: WebRequestContext
      x-sdkwork-auth-mode: dual-token
      x-sdkwork-permission: web.sites.write
      x-sdkwork-owner: sdkwork-web-server
      parameters:
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/PageSizeParam'
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DomainPage'
        '401':
          $ref: '#/components/responses/Unauthorized'
    post:
      operationId: sites.domains.create
      summary: 绑定域名
      tags: [domain]
      security:
        - AuthToken: []
          AccessToken: []
      x-sdkwork-api-surface: app-api
      x-sdkwork-api-authority: sdkwork-web.app
      x-sdkwork-request-context: WebRequestContext
      x-sdkwork-auth-mode: dual-token
      x-sdkwork-permission: web.sites.write
      x-sdkwork-idempotent: true
      x-sdkwork-owner: sdkwork-web-server
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateDomainRequest'
      responses:
        '201':
          description: 创建成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DomainResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '409':
          $ref: '#/components/responses/Conflict'

  /app/v3/api/sites/{siteId}/domains/{domainId}:
    parameters:
      - $ref: '#/components/parameters/SiteIdParam'
      - $ref: '#/components/parameters/DomainIdParam'
    get:
      operationId: sites.domains.retrieve
      summary: 获取域名详情
      tags: [domain]
      security:
        - AuthToken: []
          AccessToken: []
      x-sdkwork-api-surface: app-api
      x-sdkwork-api-authority: sdkwork-web.app
      x-sdkwork-request-context: WebRequestContext
      x-sdkwork-auth-mode: dual-token
      x-sdkwork-permission: web.sites.write
      x-sdkwork-owner: sdkwork-web-server
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DomainResponse'
        '404':
          $ref: '#/components/responses/NotFound'
    delete:
      operationId: sites.domains.delete
      summary: 解绑域名
      tags: [domain]
      security:
        - AuthToken: []
          AccessToken: []
      x-sdkwork-api-surface: app-api
      x-sdkwork-api-authority: sdkwork-web.app
      x-sdkwork-request-context: WebRequestContext
      x-sdkwork-auth-mode: dual-token
      x-sdkwork-permission: web.sites.write
      x-sdkwork-owner: sdkwork-web-server
      responses:
        '204':
          description: 删除成功
        '404':
          $ref: '#/components/responses/NotFound'

  /app/v3/api/sites/{siteId}/domains/{domainId}/verify:
    parameters:
      - $ref: '#/components/parameters/SiteIdParam'
      - $ref: '#/components/parameters/DomainIdParam'
    post:
      operationId: sites.domains.verify
      summary: 验证域名所有权
      tags: [domain]
      security:
        - AuthToken: []
          AccessToken: []
      x-sdkwork-api-surface: app-api
      x-sdkwork-api-authority: sdkwork-web.app
      x-sdkwork-request-context: WebRequestContext
      x-sdkwork-auth-mode: dual-token
      x-sdkwork-permission: web.sites.write
      x-sdkwork-idempotent: true
      x-sdkwork-owner: sdkwork-web-server
      x-sdkwork-rate-limit-tier: auth-critical
      responses:
        '200':
          description: 验证成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DomainVerifyResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'

  /app/v3/api/sites/{siteId}/deployments:
    parameters:
      - $ref: '#/components/parameters/SiteIdParam'
    get:
      operationId: sites.deployments.list
      summary: 获取部署历史
      tags: [deployment]
      security:
        - AuthToken: []
          AccessToken: []
      x-sdkwork-api-surface: app-api
      x-sdkwork-api-authority: sdkwork-web.app
      x-sdkwork-request-context: WebRequestContext
      x-sdkwork-auth-mode: dual-token
      x-sdkwork-permission: web.sites.write
      x-sdkwork-owner: sdkwork-web-server
      parameters:
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/PageSizeParam'
        - name: status
          in: query
          schema:
            type: integer
            enum: [0, 1, 2, 3, 4, 5]
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeploymentPage'
        '401':
          $ref: '#/components/responses/Unauthorized'
    post:
      operationId: sites.deployments.create
      summary: 发起部署
      tags: [deployment]
      security:
        - AuthToken: []
          AccessToken: []
      x-sdkwork-api-surface: app-api
      x-sdkwork-api-authority: sdkwork-web.app
      x-sdkwork-request-context: WebRequestContext
      x-sdkwork-auth-mode: dual-token
      x-sdkwork-permission: web.sites.write
      x-sdkwork-idempotent: true
      x-sdkwork-owner: sdkwork-web-server
      x-sdkwork-rate-limit-tier: auth-critical
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateDeploymentRequest'
      responses:
        '201':
          description: 部署已触发
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeploymentResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '409':
          $ref: '#/components/responses/Conflict'

  /app/v3/api/sites/{siteId}/deployments/{deploymentId}:
    parameters:
      - $ref: '#/components/parameters/SiteIdParam'
      - $ref: '#/components/parameters/DeploymentIdParam'
    get:
      operationId: sites.deployments.retrieve
      summary: 获取部署详情
      tags: [deployment]
      security:
        - AuthToken: []
          AccessToken: []
      x-sdkwork-api-surface: app-api
      x-sdkwork-api-authority: sdkwork-web.app
      x-sdkwork-request-context: WebRequestContext
      x-sdkwork-auth-mode: dual-token
      x-sdkwork-permission: web.sites.write
      x-sdkwork-owner: sdkwork-web-server
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeploymentResponse'
        '404':
          $ref: '#/components/responses/NotFound'

  /app/v3/api/sites/{siteId}/deployments/{deploymentId}/rollback:
    parameters:
      - $ref: '#/components/parameters/SiteIdParam'
      - $ref: '#/components/parameters/DeploymentIdParam'
    post:
      operationId: sites.deployments.rollback
      summary: 回滚部署
      tags: [deployment]
      security:
        - AuthToken: []
          AccessToken: []
      x-sdkwork-api-surface: app-api
      x-sdkwork-api-authority: sdkwork-web.app
      x-sdkwork-request-context: WebRequestContext
      x-sdkwork-auth-mode: dual-token
      x-sdkwork-permission: web.sites.write
      x-sdkwork-idempotent: true
      x-sdkwork-owner: sdkwork-web-server
      x-sdkwork-rate-limit-tier: auth-critical
      responses:
        '200':
          description: 回滚成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeploymentResponse'
        '404':
          $ref: '#/components/responses/NotFound'

  /app/v3/api/sites/{siteId}/env_variables:
    parameters:
      - $ref: '#/components/parameters/SiteIdParam'
    get:
      operationId: sites.envVariables.list
      summary: 获取环境变量列表
      tags: [envVariable]
      security:
        - AuthToken: []
          AccessToken: []
      x-sdkwork-api-surface: app-api
      x-sdkwork-api-authority: sdkwork-web.app
      x-sdkwork-request-context: WebRequestContext
      x-sdkwork-auth-mode: dual-token
      x-sdkwork-permission: web.sites.write
      x-sdkwork-owner: sdkwork-web-server
      parameters:
        - name: environment
          in: query
          schema:
            type: string
            default: production
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EnvVariablePage'
    post:
      operationId: sites.envVariables.create
      summary: 创建环境变量
      tags: [envVariable]
      security:
        - AuthToken: []
          AccessToken: []
      x-sdkwork-api-surface: app-api
      x-sdkwork-api-authority: sdkwork-web.app
      x-sdkwork-request-context: WebRequestContext
      x-sdkwork-auth-mode: dual-token
      x-sdkwork-permission: web.sites.write
      x-sdkwork-idempotent: true
      x-sdkwork-owner: sdkwork-web-server
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateEnvVariableRequest'
      responses:
        '201':
          description: 创建成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EnvVariableResponse'

  /app/v3/api/certificates:
